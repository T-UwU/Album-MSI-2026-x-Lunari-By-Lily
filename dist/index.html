<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legion Lunari · MSI 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@300;500;600;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

</head>
<body class="login-body">
  <canvas id="embers" aria-hidden="true"></canvas>
  <div class="login-vignette" aria-hidden="true"></div>

  <main class="login3d">
    <div class="book3d-scene">
      <div class="book3d-shadow" aria-hidden="true"></div>
      <div class="book3d" id="book3d">
        <div class="b3d-face b3d-front">
          <img src="album/pages/page_00.jpg" alt="Álbum MSI 2026 · Legión Lunari">
        </div>
        <div class="b3d-face b3d-back" aria-hidden="true"></div>
        <div class="b3d-face b3d-pages" aria-hidden="true"></div>
        <div class="b3d-face b3d-spine" aria-hidden="true"></div>
        <div class="b3d-face b3d-top" aria-hidden="true"></div>
        <div class="b3d-face b3d-bottom" aria-hidden="true"></div>
      </div>
    </div>

    <div class="login3d-panel">
      <img class="login-logo" src="img/legion-lunari-logo.png" alt="Legión Lunari">
      <h1 class="panel-title">Abre tu álbum</h1>
      <p class="login-sub">Solo para miembros del servidor de <b>Legión Lunari</b>. Inicia sesión con Discord para verificarlo.</p>

      <div class="toast" id="loginNote" role="status" hidden></div>

      <div class="login-actions">
        <a class="btn btn-discord" id="discordBtn" href="/api/login">
          <svg viewBox="0 -28.5 256 256" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M216.856339,16.5966031 C200.285002,8.84328665 182.566144,3.2084988 164.041564,0 C161.766523,4.11318106 159.108624,9.64549908 157.276099,14.0464379 C137.583995,11.0849896 118.072967,11.0849896 98.7430163,14.0464379 C96.9108417,9.64549908 94.1925838,4.11318106 91.8971895,0 C73.3526068,3.2084988 55.6133949,8.86399117 39.0420583,16.6376612 C5.61752293,67.146514 -3.4433191,116.400813 1.08711069,164.955721 C23.2560196,181.510915 44.7403634,191.567697 65.8621325,198.148576 C71.0772151,190.971126 75.7283628,183.341335 79.7352139,175.300261 C72.104019,172.400575 64.7949724,168.822202 57.8887866,164.667963 C59.7209612,163.310589 61.5131304,161.891452 63.2445898,160.431257 C105.36741,180.133187 151.134928,180.133187 192.754523,160.431257 C194.506336,161.891452 196.298154,163.310589 198.110326,164.667963 C191.183787,168.842556 183.854737,172.420929 176.223542,175.320965 C180.230393,183.341335 184.861538,190.991831 190.096624,198.16893 C211.238746,191.588051 232.743023,181.531619 254.911949,164.955721 C260.227747,108.668201 245.831087,59.8662432 216.856339,16.5966031 Z M85.4738752,135.09489 C72.8290281,135.09489 62.4592217,123.290155 62.4592217,108.914901 C62.4592217,94.5396472 72.607595,82.7145587 85.4738752,82.7145587 C98.3405064,82.7145587 108.709962,94.5189427 108.488529,108.914901 C108.508531,123.290155 98.3405064,135.09489 85.4738752,135.09489 Z M170.525237,135.09489 C157.88039,135.09489 147.510584,123.290155 147.510584,108.914901 C147.510584,94.5396472 157.658606,82.7145587 170.525237,82.7145587 C183.391518,82.7145587 193.761324,94.5189427 193.539891,108.914901 C193.539891,123.290155 183.391518,135.09489 170.525237,135.09489 Z"/></svg>
          Continuar con Discord
        </a>
        
      </div>
    </div>
  </main>

  <script src="js/embers.js?v=70899341"></script>
  <script>
    (function () {
      
      const q = new URLSearchParams(location.search);
      const note = document.getElementById("loginNote");
      if (note) {
        let msg = "";
        if (q.get("denied")) msg = "No estás en el servidor de Legión Lunari, así que no puedes ver el álbum.";
        else if (q.get("need_login")) msg = "Inicia sesión con Discord para ver el álbum.";
        else if (q.get("error")) msg = "Hubo un problema al iniciar sesión. Inténtalo de nuevo.";
        if (msg) { note.textContent = msg; note.hidden = false; }
      }

      const book = document.getElementById("book3d");
      const scene = document.querySelector(".book3d-scene");
      if (!book || !scene) return;
      const BASE_Y = -20, BASE_X = 6;
      book.style.transform = `rotateY(${BASE_Y}deg) rotateX(${BASE_X}deg)`;

      let startPt = null, moved = false;
      function rotateTo(clientX, clientY) {
        const r = scene.getBoundingClientRect();
        const dx = (clientX - (r.left + r.width / 2)) / window.innerWidth;
        const dy = (clientY - (r.top + r.height / 2)) / window.innerHeight;
        const ry = Math.max(-60, Math.min(30, BASE_Y + dx * 55));
        const rx = Math.max(-20, Math.min(30, BASE_X - dy * 30));
        book.style.transform = `rotateY(${ry}deg) rotateX(${rx}deg)`;
      }
      window.addEventListener("pointerdown", (e) => { startPt = { x: e.clientX, y: e.clientY }; moved = false; });
      window.addEventListener("pointermove", (e) => { rotateTo(e.clientX, e.clientY); });

      window.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        if (!t) return;
        rotateTo(t.clientX, t.clientY);
        if (startPt && Math.hypot(t.clientX - startPt.x, t.clientY - startPt.y) > 12) moved = true;
      }, { passive: true });

      scene.addEventListener("click", () => {
        if (moved) return;
        const a = document.getElementById("discordBtn");
        if (a) location.href = a.href;
      });
    })();
  </script>
</body>
</html>
